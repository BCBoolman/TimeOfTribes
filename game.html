<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time of Tribes - Game</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           BASIS STYLING
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cinzel', serif;
        }

        body {
            background: #000;
            height: 100vh;
            width: 100vw;
            color: #d1d1d1;
            overflow: hidden;
            position: relative;
        }

        #map {
            position: absolute;
            top: 0; bottom: 0; width: 100%;
            z-index: 1;
        }

        /* =========================================
           UI LAYERS (BOVEN & ONDER)
           ========================================= */
        .game-ui-top {
            position: fixed;
            top: 0; width: 100%;
            z-index: 1000; /* Altijd boven alles */
            pointer-events: none;
        }

        .timer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 8, 20, 0.9);
            backdrop-filter: blur(5px);
            padding: 15px 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
        }

        #gameClock, #dayTimer {
            font-size: 1.3rem; 
            font-weight: bold;
            letter-spacing: 1px;
            color: #fff;
        }

        .top-logo {
            height: 55px;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
        }

        .resource-row {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 5px;
            color: #fbbf24;
            pointer-events: auto;
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* UNIFORME KNOPPEN (LOGIN STIJL) */
        .game-btn, .btn-interact {
            background: rgba(0, 8, 20, 0.9);
            backdrop-filter: blur(5px);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 18px 5px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            display: block;
            width: 100%;
            font-family: 'Cinzel', serif;
        }

        .game-btn:active, .btn-interact:active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .game-ui-bottom {
            position: fixed;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 1000;
            padding: 0 15px;
            pointer-events: none;
        }

        .game-ui-bottom .game-btn {
            flex: 1;
            pointer-events: auto;
        }

        /* =========================================
           POPUP & MODAL STYLING
           ========================================= */
        .leaflet-popup-content-wrapper {
            background: rgba(0, 8, 20, 0.95);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0;
            padding: 5px;
        }

        .leaflet-popup-tip { background: rgba(0, 8, 20, 0.95); }

        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 450px;
            background: rgba(0, 8, 20, 0.98);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-modal {
            background: none; border: none; color: #ff4444; font-size: 1.5rem; cursor: pointer; font-weight: bold;
        }

        /* =========================================
           STATUS & MARKERS (HET PROBLEEMGEBIED)
           ========================================= */
        .custom-icon-container {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            width: 60px !important; 
            height: 60px !important; 
            position: relative;
            overflow: visible !important; /* Zorgt dat het uitroepteken buiten het kader mag */
            z-index: 500 !important;
        }

        .map-emoji {
            font-size: 32px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,1));
            z-index: 501;
        }

        /* UITROEPTEKEN FIX: Hogere z-index en betere positie */
        .warning-blink {
            position: absolute;
            top: -35px; /* Hoger boven de emoji */
            left: 50%;
            transform: translateX(-50%);
            animation: blinker 0.8s linear infinite;
            font-weight: 900; 
            font-size: 48px; /* Lekker groot */
            z-index: 9999 !important; /* Forceer boven alles */
            /* Krachtige omlijning voor zichtbaarheid */
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff,
                 0px 0px 10px rgba(0,0,0,1);
        }

        @keyframes blinker { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        /* Kleuren voor het uitroepteken */
        .status-claim { color: #000; } 
        .status-attack { color: #ff0000; }
        .status-upgrade { color: #00ff00; }

        #status-bar {
            position: fixed; top: 135px; left: 50%;
            transform: translateX(-50%);
            background: rgba(220, 38, 38, 0.9);
            color: white; padding: 10px 20px;
            font-size: 0.9rem; font-weight: bold;
            z-index: 1500; display: none;
            border: 1px solid white;
        }

        #game-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 15, 0.98); z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-overlay">
        <h1 style="font-size: 2rem; letter-spacing: 5px;">Time of Tribes</h1>
        <p id="overlay-msg" style="font-size: 1.2rem; margin-top: 20px;">Verbinding maken...</p>
    </div>

    <div id="status-bar">Melding...</div>

    <div class="game-ui-top">
        <div class="timer-row">
            <div>⏱️ <span id="gameClock">02:00:00</span></div>
            <img src="images/Time of Tribes - logo.svg" class="top-logo" alt="Logo">
            <div>☀️ <span id="dayTimer" style="color:#facc15">15:00</span></div>
        </div>
        <div class="resource-row">
            <div>🌾 <span id="food">0</span></div> 
            <div>🪵 <span id="wood">0</span></div>
            <div>🪨 <span id="stone">0</span></div> 
            <div>💰 <span id="coins">0</span></div>
        </div>
    </div>

    <div id="map"></div>

    <div id="tradeModal" class="modal">
        <div class="modal-header">
            <h2 style="font-size: 1.2rem; letter-spacing: 2px;">Handelspost</h2>
            <button class="close-modal" onclick="closeModal('tradeModal')">✕</button>
        </div>
        <div class="modal-body"><p style="text-align:center; opacity:0.6;">Nog geen handelaren...</p></div>
    </div>

    <div id="missionModal" class="modal">
        <div class="modal-header">
            <h2 style="font-size: 1.2rem; letter-spacing: 2px;">Missies</h2>
            <button class="close-modal" onclick="closeModal('missionModal')">✕</button>
        </div>
        <div class="modal-body"><p style="text-align:center; opacity:0.6;">Geen missies...</p></div>
    </div>

    <div class="game-ui-bottom">
        <button class="game-btn" onclick="locateUser()">📍 GPS</button>
        <button class="game-btn" onclick="openModal('tradeModal')">🤝 Handel</button>
        <button class="game-btn" onclick="openModal('missionModal')">📜 Missies</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxPFzpgc05W4SXZtD5T3cxXZoBzMIxUFI316UWfibVdtp5NencKdi0fPPYyPcYV47JWLQ/exec"; 
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([52.148, 4.517], 15);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}{r}.png').addTo(map);
        
        const locationLayer = L.layerGroup().addTo(map);
        let userMarker, userTeam = "", markersRef = {}, isInteracting = false, gameStartTime = null, warnedForConsumption = false;

        function showStatus(msg, duration = 4000) {
            const bar = document.getElementById('status-bar');
            bar.innerText = msg; bar.style.display = "block";
            setTimeout(() => { bar.style.display = "none"; }, duration);
        }

        function openModal(id) { document.getElementById(id).style.display = "flex"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }

        async function fetchStartTime() {
            try {
                const r = await fetch(`${scriptURL}?action=getStartTime`);
                const d = await r.json();
                if (d.status === "waiting") return showOverlay("Wachten...", "Start: " + new Date(d.startTime).toLocaleTimeString());
                if (d.status === "finished") return showOverlay("Afgelopen", "Het spel is voorbij.");
                gameStartTime = d.startTime;
                heartbeat();
                hideOverlay();
            } catch(e) { setTimeout(fetchStartTime, 5000); }
        }

        function showOverlay(title, msg) {
            document.getElementById('game-overlay').style.display = "flex";
            document.getElementById('overlay-title').innerText = title;
            document.getElementById('overlay-msg').innerText = msg;
        }
        function hideOverlay() { document.getElementById('game-overlay').style.display = "none"; }

        function heartbeat() { updateClocks(); setTimeout(heartbeat, 1000); }

        function updateClocks() {
            if (!gameStartTime) return;
            const nu = Date.now(), diff = nu - gameStartTime, resterend = (gameStartTime + (120 * 60 * 1000)) - nu;
            if (resterend <= 0) return showOverlay("Einde Spel", "De tijd is om!");

            const h = Math.floor(resterend / 3600000).toString().padStart(2, '0');
            const m = Math.floor((resterend % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((resterend % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('gameClock').innerText = `${h}:${m}:${s}`;

            const cycMs = 15 * 60 * 1000, restMs = cycMs - (diff % cycMs);
            const dm = Math.floor(restMs / 60000).toString().padStart(2, '0');
            const ds = Math.floor((restMs % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('dayTimer').innerText = `${dm}:${ds}`;

            if (dm === "01" && ds === "00" && !warnedForConsumption) {
                showStatus("⚠️ Consumptie over 1 minuut!");
                warnedForConsumption = true;
            }
            if (dm === "14") warnedForConsumption = false; 
            if (dm === "00" && ds === "00") setTimeout(updateGame, 1500);
        }

        async function updateGame() {
            const naam = localStorage.getItem("tribe_player");
            if (!naam) return;
            try {
                const [rRes, lRes] = await Promise.all([
                    fetch(`${scriptURL}?action=getResources&naam=${encodeURIComponent(naam)}`),
                    fetch(`${scriptURL}?action=getLocations`)
                ]);
                const rData = await rRes.json(), lData = await lRes.json();
                
                if(rData.result === "success") {
                    document.getElementById('food').innerText = Math.floor(rData.data.food);
                    document.getElementById('wood').innerText = Math.floor(rData.data.wood);
                    document.getElementById('stone').innerText = Math.floor(rData.data.stone);
                    document.getElementById('coins').innerText = Math.floor(rData.data.coins);
                    userTeam = rData.data.team;
                }
                
                locationLayer.clearLayers();
                lData.data.forEach(loc => {
                    const coords = loc.coords.split(',').map(Number);
                    const dist = userMarker ? map.distance(userMarker.getLatLng(), coords) : 999;
                    const rawOwner = loc.eigenaar || "geen";
                    const isOwner = rawOwner.toLowerCase() === userTeam.toLowerCase();
                    const currentStatus = loc.status || "ok";
                    const statusClassLabel = currentStatus.toLowerCase() === "ok" ? "text-status-ok" : "text-status-active";
                    
                    let emoji = "🏰", btnTxt = "N/A", time = 0, act = "", cost = "", disabled = (dist > 25);
                    if (loc.type.toLowerCase().includes("voedsel")) emoji = "🌾";
                    if (loc.type.toLowerCase().includes("hout")) emoji = "🪵";
                    if (loc.type.toLowerCase().includes("steen")) emoji = "🪨";

                    if (loc.type.toLowerCase().includes("basis")) {
                        if (isOwner) {
                            act = "upgrade";
                            if (loc.upgrade === "standaard") { btnTxt = "Wachtposten"; cost = "100🪵, 50🪨"; }
                            else if (loc.upgrade === "Wachtposten") { btnTxt = "Palissadeuur"; cost = "150🪵, 150🪨"; }
                            else if (loc.upgrade === "Palissademuur") { btnTxt = "Fortificaties"; cost = "200🪵, 200🪨, 100💰"; }
                            else { btnTxt = "MAX"; act = ""; }
                            time = 30;
                        } else {
                            act = "attack"; btnTxt = "Aanvallen"; cost = "150💰";
                            time = loc.attackDuration;
                            if (!loc.canAttackBasis) { btnTxt = "Val eerst alle mijnen aan van dit team."; disabled = true; }
                        }
                    } else {
                        if (rawOwner === "geen") { act = "claim"; btnTxt = "Claimen"; cost = "75🌾, 75🪵, 75🪨"; time = 30; }
                        else if (isOwner) {
                            act = "upgrade";
                            if (loc.upgrade === "standaard") { btnTxt = "Gewapende Arbeiders"; cost = "50🌾, 50💰"; }
                            else if (loc.upgrade === "Gewapende Arbeiders") { btnTxt = "Buitenpost"; cost = "75🪵, 75🪨"; }
                            else { btnTxt = "MAX"; act = ""; }
                            time = 30;
                        } else {
                            act = "attack"; btnTxt = "Sloop deze mijn"; cost = "75💰"; time = loc.attackDuration;
                        }
                    }

                    // UITROEPTEKEN LOGICA MET NIEUWE STIJL
                    let blinkIcon = "";
                    if (currentStatus.toLowerCase() !== "ok") {
                        let bClass = "";
                        const s = currentStatus.toLowerCase();
                        if (s.includes("claim")) bClass = "status-claim";
                        else if (s.includes("aanval") || s.includes("attack")) bClass = "status-attack";
                        else if (s.includes("upgrad") || s.includes("üpgrad")) bClass = "status-upgrade";
                        if (bClass !== "") blinkIcon = `<div class="warning-blink ${bClass}">!</div>`;
                    }

                    const iconHtml = `<div class="custom-icon-container">${blinkIcon}<div class="map-emoji">${emoji}</div></div>`;
                    
                    const popupHTML = `<div style="text-align:center; min-width:180px; color:#fff; font-family:'Cinzel',serif;">
                        <b style="font-size:1.1rem; letter-spacing:1px; color:#fbbf24;">${loc.type}</b><br>
                        <span style="font-size:0.8rem; opacity:0.8;">${loc.upgrade}</span>
                        <hr style="margin:8px 0; opacity:0.2;">
                        <div style="text-align:left; font-size:0.85rem; margin-bottom:10px; line-height:1.4;">
                            Eigenaar: <span style="color:${loc.kleur || '#fff'}; font-weight:bold;">${rawOwner === "geen" ? "Niemand" : rawOwner}</span><br>
                            Status: <span style="font-weight:bold; color:${currentStatus.toLowerCase() === 'ok' ? '#22c55e' : '#fbbf24'}">${currentStatus}</span>
                        </div>
                        <span style="font-size:0.8rem; display:block; margin-bottom:8px; opacity:0.7;">Kost: ${cost}</span>
                        <button class="btn-interact" id="btn-${loc.id}" onclick="startInteract(${loc.id},'${act}',${time},[${coords}])" ${disabled||act===""?'disabled':''}>${btnTxt}</button>
                    </div>`;

                    // CIRKEL TEKENEN
                    L.circle(coords, { radius: 15, color: loc.kleur || '#fff', fillOpacity: 0.4, weight: 2 }).addTo(locationLayer).bindPopup(popupHTML);
                    
                    // MARKER (EMOJI + !) TEKENEN
                    L.marker(coords, { 
                        icon: L.divIcon({ 
                            className:'custom-div-icon', 
                            html: iconHtml, 
                            iconSize: [60, 60], 
                            iconAnchor: [30, 30] 
                        }), 
                        interactive: false 
                    }).addTo(locationLayer);
                    
                    markersRef[loc.id] = { coords };
                });
            } catch(e) { console.error(e); }
        }

        async function startInteract(id, act, duration, coords) {
            if (isInteracting) return showStatus("❌ Al bezig!");
            try { await fetch(`${scriptURL}?action=interact&subAction=startCapture&id=${id}&type=${act}&team=${encodeURIComponent(userTeam)}`); } catch(e) {}
            const endTimestamp = Date.now() + (duration * 1000);
            localStorage.setItem('activeInteract', JSON.stringify({ id, act, endTimestamp, coords }));
            runTimerCycle();
            updateGame(); 
        }

        function runTimerCycle() {
            const data = localStorage.getItem('activeInteract');
            if (!data) { isInteracting = false; return; }
            isInteracting = true;
            const { id, act, endTimestamp, coords } = JSON.parse(data);
            const over = Math.ceil((endTimestamp - Date.now()) / 1000);
            if (over <= 0) { finishInteract(id, act); return; }
            if (userMarker && map.distance(userMarker.getLatLng(), coords) > 25) {
                localStorage.removeItem('activeInteract'); isInteracting = false;
                showStatus("⚠️ Te ver weg!");
                fetch(`${scriptURL}?action=interact&subAction=cancelCapture&id=${id}`);
                updateGame(); return;
            }
            const btn = document.getElementById(`btn-${id}`);
            if (btn) { btn.disabled = true; btn.innerText = `${over}s`; btn.style.background = "#d97706"; }
            setTimeout(runTimerCycle, 1000);
        }

        async function finishInteract(id, act) {
            const speler = localStorage.getItem("tribe_player");
            const r = await fetch(`${scriptURL}?action=interact&subAction=${act}&id=${id}&team=${encodeURIComponent(userTeam)}&naam=${encodeURIComponent(speler)}`);
            const d = await r.json();
            showStatus(d.msg || "✅ Voltooid!");
            localStorage.removeItem('activeInteract'); isInteracting = false;
            updateGame();
        }

        function locateUser() { map.locate({setView: true, maxZoom: 17}); }
        map.on('locationfound', e => {
            if (!userMarker) userMarker = L.circleMarker(e.latlng, {radius: 10, color: '#fff', weight: 3, fillOpacity: 1, fillColor: '#2563eb'}).addTo(map);
            else userMarker.setLatLng(e.latlng);
        });

        window.onload = () => { 
            fetchStartTime(); updateGame(); 
            setInterval(updateGame, 15000); 
            const active = localStorage.getItem('activeInteract');
            if (active) {
                const parsed = JSON.parse(active);
                if (Date.now() > parsed.endTimestamp) localStorage.removeItem('activeInteract');
                else runTimerCycle();
            }
            locateUser(); 
        };
    </script>
</body>
</html>
