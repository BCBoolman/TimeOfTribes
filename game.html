<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time of Tribes</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; font-family: sans-serif; overflow: hidden; color: white; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .game-ui-top { position: fixed; top: 0; width: 100%; z-index: 100; pointer-events: none; }
        .timer-row { display: flex; justify-content: space-between; background: rgba(0,0,0,0.9); padding: 12px; border-bottom: 1px solid #444; pointer-events: auto; }
        .resource-row { display: flex; justify-content: space-around; background: rgba(30,30,30,0.9); padding: 8px; color: #fbbf24; pointer-events: auto; font-size: 0.9rem; font-weight: bold; }
        .game-ui-bottom { position: fixed; bottom: 25px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 100; padding: 0 15px; box-sizing: border-box; }
        .game-btn { background: #333; color: white; border: 1px solid #555; padding: 14px; border-radius: 8px; flex: 1; font-weight: bold; pointer-events: auto; }
        .btn-interact { background: #2563eb; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-interact:disabled { background: #4b5563; color: #9ca3af; cursor: not-allowed; }
        
        .custom-icon-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 50px !important; height: 50px !important; }
        .map-emoji { font-size: 28px; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.8)); line-height: 1; }
        .warning-blink { animation: blinker 0.8s linear infinite; color: #ff4444; font-weight: bold; font-size: 24px; filter: drop-shadow(0px 0px 3px black); margin-bottom: -5px; }
        @keyframes blinker { 50% { opacity: 0; } }
        
        .day-timer { color: #facc15; font-family: monospace; font-weight: bold; }
        .popup-content { text-align: center; color: #333; min-width: 180px; }
        #game-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

    <div id="game-overlay">
        <h1 id="overlay-title">Spel Status</h1>
        <p id="overlay-msg">Laden...</p>
    </div>

    <div class="game-ui-top">
        <div class="timer-row">
            <div>⏱️ <span id="gameClock">02:00:00</span></div>
            <div>☀️ Dag: <span id="dayTimer" class="day-timer">15:00</span></div>
        </div>
        <div class="resource-row">
            <div>🌾 <span id="food">0</span></div> <div>🪵 <span id="wood">0</span></div>
            <div>🪨 <span id="stone">0</span></div> <div>💰 <span id="coins">0</span></div>
        </div>
    </div>

    <div id="map"></div>

    <div class="game-ui-bottom">
        <button class="game-btn" onclick="locateUser()">GPS</button>
        <button class="game-btn" onclick="autoOpenInteract()">INTERACTIE</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzybA897Amdr7i_rlTATqY6_XzCkhcelSews7xaB8ZewaX3S7ghReughhmxi20W8U2V1Q/exec"; // VERVANG DEZE URL!
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([52.148, 4.517], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const locationLayer = L.layerGroup().addTo(map);
        
        let userMarker, userTeam = "", markersRef = {}, isInteracting = false, gameStartTime = null, warnedForConsumption = false;

        async function fetchStartTime() {
            try {
                const r = await fetch(`${scriptURL}?action=getStartTime`);
                const d = await r.json();
                if (d.status === "waiting") return showOverlay("Wachten...", "Spel start om " + new Date(d.startTime).toLocaleTimeString());
                if (d.status === "finished") return showOverlay("Afgelopen", "Het spel is voorbij.");
                gameStartTime = d.startTime;
                hideOverlay();
                heartbeat();
            } catch(e) { setTimeout(fetchStartTime, 5000); }
        }

        function showOverlay(title, msg) {
            document.getElementById('game-overlay').style.display = "flex";
            document.getElementById('overlay-title').innerText = title;
            document.getElementById('overlay-msg').innerText = msg;
        }
        function hideOverlay() { document.getElementById('game-overlay').style.display = "none"; }

        function heartbeat() { updateClocks(); setTimeout(heartbeat, 1000); }

        function updateClocks() {
            if (!gameStartTime) return;
            const nu = Date.now(), diff = nu - gameStartTime, resterend = (gameStartTime + (120 * 60 * 1000)) - nu;

            if (resterend <= 0) return showOverlay("Einde Spel", "De tijd is om!");

            const h = Math.floor(resterend / 3600000).toString().padStart(2, '0');
            const m = Math.floor((resterend % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((resterend % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('gameClock').innerText = `${h}:${m}:${s}`;

            const cycMs = 15 * 60 * 1000, restMs = cycMs - (diff % cycMs);
            const dm = Math.floor(restMs / 60000).toString().padStart(2, '0');
            const ds = Math.floor((restMs % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('dayTimer').innerText = `${dm}:${ds}`;

            // 1 Minuut waarschuwing voor consumptie
            if (dm === "01" && ds === "00" && !warnedForConsumption) {
                alert("⚠️ LET OP: De dagconsumptie wordt over 1 minuut afgeschreven!");
                warnedForConsumption = true;
            }
            if (dm === "14") warnedForConsumption = false; 
            if (dm === "00" && ds === "00") setTimeout(updateGame, 1500);
        }

async function startInteract(id, act, duration, coords) {
    if (isInteracting) return alert("Je bent al bezig met een actie!");
    
    // NIEUW: Meld de server direct dat we beginnen voor de status-update
    try {
        await fetch(`${scriptURL}?action=interact&subAction=startCapture&id=${id}&type=${act}&team=${encodeURIComponent(userTeam)}`);
    } catch(e) { console.error("Kon status niet updaten"); }

    const endTimestamp = Date.now() + (duration * 1000);
    localStorage.setItem('activeInteract', JSON.stringify({ id, act, endTimestamp, coords }));
    
    runTimerCycle();
    updateGame(); // Ververs kaart direct om de warning te zien
}

async function stopInteractRemote(id, msg) {
    localStorage.removeItem('activeInteract');
    isInteracting = false;
    alert(msg);
    // Meld de server dat het geannuleerd is
    await fetch(`${scriptURL}?action=interact&subAction=cancelCapture&id=${id}`);
    updateGame();
}

        function runTimerCycle() {
            const data = localStorage.getItem('activeInteract');
            if (!data) { isInteracting = false; return; }
            isInteracting = true;
            const { id, act, endTimestamp, coords } = JSON.parse(data);
            const over = Math.ceil((endTimestamp - Date.now()) / 1000);
            
            if (over <= 0) { finishInteract(id, act); return; }
            if (userMarker && map.distance(userMarker.getLatLng(), coords) > 25) {
                alert("Buiten bereik! Actie afgebroken.");
                localStorage.removeItem('activeInteract');
                isInteracting = false;
                updateGame();
                return;
            }

            const btn = document.getElementById(`btn-${id}`);
            if (btn) {
                btn.disabled = true;
                btn.innerText = `${act.toUpperCase()}... ${over}s`;
                btn.style.background = "#d97706";
            }
            setTimeout(runTimerCycle, 1000);
        }

        async function finishInteract(id, act) {
            const speler = localStorage.getItem("tribe_player");
            const r = await fetch(`${scriptURL}?action=interact&subAction=${act}&id=${id}&team=${encodeURIComponent(userTeam)}&naam=${encodeURIComponent(speler)}`);
            const d = await r.json();
            alert(d.msg || (d.result === "success" ? "Actie geslaagd!" : "Mislukt: " + d.msg));
            localStorage.removeItem('activeInteract');
            isInteracting = false;
            updateGame();
        }

        async function updateGame() {
            const naam = localStorage.getItem("tribe_player");
            if (!naam) return;
            try {
                const [rRes, lRes] = await Promise.all([
                    fetch(`${scriptURL}?action=getResources&naam=${encodeURIComponent(naam)}`),
                    fetch(`${scriptURL}?action=getLocations`)
                ]);
                const rData = await rRes.json(), lData = await lRes.json();
                
                if(rData.result === "success") {
                    document.getElementById('food').innerText = Math.floor(rData.data.food);
                    document.getElementById('wood').innerText = Math.floor(rData.data.wood);
                    document.getElementById('stone').innerText = Math.floor(rData.data.stone);
                    document.getElementById('coins').innerText = Math.floor(rData.data.coins);
                    userTeam = rData.data.team;
                }
                
                locationLayer.clearLayers();
                lData.data.forEach(loc => {
                    const coords = loc.coords.split(',').map(Number);
                    const dist = userMarker ? map.distance(userMarker.getLatLng(), coords) : 999;
                    const isOwner = loc.eigenaar.toLowerCase() === userTeam.toLowerCase();
                    const isBasis = loc.type.toLowerCase().includes("basis");
                    
                    let emoji = "🏰", btnTxt = "N/A", time = 0, act = "", cost = "", disabled = (dist > 25);
                    if (loc.type.toLowerCase().includes("voedsel")) emoji = "🌾";
                    if (loc.type.toLowerCase().includes("hout")) emoji = "🪵";
                    if (loc.type.toLowerCase().includes("steen")) emoji = "🪨";

                    if (isBasis) {
                        if (isOwner) {
                            act = "upgrade";
                            if (loc.upgrade === "standaard") { btnTxt = "Wachtposten"; cost = "100🪵, 50🪨"; }
                            else if (loc.upgrade === "Wachtposten") { btnTxt = "Palissademuur"; cost = "150🪵, 150🪨"; }
                            else if (loc.upgrade === "Palissademuur") { btnTxt = "Fortificaties"; cost = "200🪵, 200🪨, 100💰"; }
                            else { btnTxt = "MAX"; act = ""; }
                            time = 30;
                        } else {
                            act = "attack"; btnTxt = "Basis Aanvallen"; cost = "150💰";
                            time = loc.attackDuration;
                            if (!loc.canAttackBasis) { btnTxt = "Vernietig eerst alle mijnen van dit team"; disabled = true; }
                        }
                    } else {
                        if (loc.eigenaar === "geen") { act = "claim"; btnTxt = "Mijn Bouwen"; cost = "75🌾, 75🪵, 75🪨"; time = 30; }
                        else if (isOwner) {
                            act = "upgrade";
                            if (loc.upgrade === "standaard") { btnTxt = "Gewapende Arbeiders"; cost = "50🌾, 50💰"; }
                            else if (loc.upgrade === "Gewapende Arbeiders") { btnTxt = "Buitenpost"; cost = "75🪵, 75🪨"; }
                            else { btnTxt = "MAX"; act = ""; }
                            time = 30;
                        } else {
                            act = "attack"; btnTxt = "Mijn Aanvallen"; cost = "75💰";
                            time = loc.attackDuration;
                        }
                    }

                    const popupHTML = `<div class="popup-content"><b>${loc.type}</b><br><small>Niveau: ${loc.upgrade}</small><br><small>Eigenaar: ${loc.eigenaar}</small><hr><span style="font-size:0.75rem;">Kost: ${cost}</span><button class="btn-interact" id="btn-${loc.id}" onclick="startInteract(${loc.id},'${act}',${time},[${coords}])" ${disabled||act===""?'disabled':''}>${btnTxt}</button></div>`;

                    L.circle(coords, { radius: 15, color: loc.kleur, fillOpacity: 0.3 }).addTo(locationLayer).bindPopup(popupHTML);
                    L.marker(coords, { icon: L.divIcon({ className:'custom-div-icon', html: `<div class="custom-icon-container"><div class="map-emoji">${emoji}</div></div>`, iconSize: [50, 50], iconAnchor: [25, 25] }), interactive: false }).addTo(locationLayer);
                    markersRef[loc.id] = { coords };
                });
            } catch(e) { console.error(e); }
        }

        function autoOpenInteract() {
            if (!userMarker) return;
            for (let id in markersRef) {
                if (map.distance(userMarker.getLatLng(), markersRef[id].coords) <= 20) {
                    locationLayer.eachLayer(l => { if(l.getPopup && l.getLatLng().equals(markersRef[id].coords)) l.openPopup(); });
                    return;
                }
            }
        }

        function locateUser() { map.locate({setView: true, maxZoom: 18}); }
        map.on('locationfound', e => {
            if (!userMarker) userMarker = L.marker(e.latlng).addTo(map);
            else userMarker.setLatLng(e.latlng);
        });

        window.onload = () => { 
            fetchStartTime(); 
            updateGame(); 
            setInterval(updateGame, 15000); 
            if (localStorage.getItem('activeInteract')) runTimerCycle(); 
            locateUser(); 
        };
    </script>
</body>
</html>
