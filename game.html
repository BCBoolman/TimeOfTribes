<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time of Tribes - Explorer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* --- BASIS STYLING --- */
        body { margin: 0; padding: 0; background: #f0f0f0; font-family: sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .leaflet-container { background: #fff !important; }

        /* --- UI ELEMENTEN --- */
        .game-ui-top { position: fixed; top: 0; width: 100%; z-index: 100; pointer-events: none; }
        .timer-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); padding: 10px 15px; color: white; pointer-events: auto; }
        .resource-row { display: flex; justify-content: space-around; background: rgba(45,45,45,0.9); padding: 8px; color: #ddd; font-size: 0.85rem; pointer-events: auto; }

        .game-ui-bottom { position: fixed; bottom: 25px; width: 100%; display: flex; justify-content: center; gap: 12px; z-index: 100; padding: 0 15px; box-sizing: border-box; }
        
        .game-btn { 
            background: rgba(0, 0, 0, 0.85); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            color: #ffffff; 
            padding: 12px 5px; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            cursor: pointer; 
            flex: 1; 
            max-width: 110px; 
            text-align: center; 
            pointer-events: auto;
            border-radius: 4px;
            transition: all 0.1s ease;
        }

        .game-btn:active { background: #444; transform: scale(0.95); }

        /* --- KAART ELEMENTEN STYLING --- */
        .custom-div-icon { background: none !important; border: none !important; pointer-events: none; }

        .custom-div-icon div {
            font-size: 24px;
            text-shadow: 0px 0px 3px rgba(0,0,0,0.8), 0px 0px 5px rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
        }

        .leaflet-popup-content-wrapper { background: white; color: black; border-radius: 8px; font-size: 14px; }

        .gps-arrow-icon { display: flex; justify-content: center; align-items: center; filter: drop-shadow(0 0 2px white); }
    </style>
</head>
<body>

    <div class="game-ui-top">
        <div class="timer-row">
            <div>☀️ <span id="dayTimer">15:00</span></div>
            <div style="font-weight: bold;">VERKENNING</div>
            <div>⏳ <span id="playTimer">02:00:00</span></div>
        </div>
        <div class="resource-row">
            <div>🌾 <span id="food">0</span></div>
            <div>🪵 <span id="wood">0</span></div>
            <div>🪨 <span id="stone">0</span></div>
            <div>💰 <span id="coins">0</span></div>
        </div>
    </div>

    <div id="map"></div>

    <div class="game-ui-bottom">
        <button class="game-btn" onclick="locateUser(); requestCompassPermission();">GPS</button>
        <button class="game-btn" onclick="window.location.href='handel.html'">Handel</button>
        <button class="game-btn" onclick="alert('Interactie geactiveerd!')">Interactie</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.min.js"></script>
    
    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzCkJV2ItFicjQpACRCb1NlvirahuRSlGGNNRJXf2I2MimrodjbBT_PakmRclBBFoXvkQ/exec"; 

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([52.0907, 5.1214], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const locationLayer = L.layerGroup().addTo(map);
        let userMarker; 

        // 1. KOMPAS
        function handleOrientation(event) {
            let heading = event.alpha;
            if (event.webkitCompassHeading) heading = event.webkitCompassHeading;
            if (userMarker && heading !== undefined) userMarker.setRotationAngle(heading);
        }

        function requestCompassPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => { if (response == 'granted') window.addEventListener('deviceorientation', handleOrientation); })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }

        // 2. GAME LOGICA
        function getEmoji(omschrijving, type) {
            const tekst = (omschrijving + " " + type).toLowerCase();
            if (tekst.includes("voedsel") || tekst.includes("boerderij")) return "🌾";
            if (tekst.includes("hout") || tekst.includes("bos")) return "🪵";
            if (tekst.includes("steen") || tekst.includes("mijn")) return "🪨";
            if (tekst.includes("goud") || tekst.includes("munt")) return "💰";
            if (tekst.includes("basis") || tekst.includes("kasteel")) return "🏰";
            return "📍";
        }

        async function updateGame() {
            const naam = localStorage.getItem("tribe_player");
            if (!naam) return;

            // Locaties + Volledige Pop-up data
            fetch(`${scriptURL}?action=getLocations&t=${Date.now()}`)
                .then(r => r.json()).then(json => {
                    if(json.result === "success") {
                        locationLayer.clearLayers();
                        json.data.forEach(loc => {
                            const coords = loc.coords.split(',').map(c => parseFloat(c.trim()));
                            if(coords.length !== 2 || isNaN(coords[0])) return;

                            // HIER STAAT DE VOLLEDIGE INFO WEER TERUG
                            const popupHTML = `
                                <strong>${loc.omschrijving}</strong><br>
                                <small>${loc.type}</small><hr>
                                <b>Status:</b> ${loc.status}<br>
                                <b>Team:</b> ${loc.eigenaar}
                            `;

                            L.circle(coords, {
                                radius: 25, color: loc.kleur, fillColor: loc.kleur, fillOpacity: 0.5, weight: 3
                            }).addTo(locationLayer).bindPopup(popupHTML);

                            L.marker(coords, {
                                icon: L.divIcon({
                                    className: 'custom-div-icon',
                                    html: `<div>${getEmoji(loc.omschrijving, loc.type)}</div>`,
                                    iconSize: [32, 32], iconAnchor: [16, 16]
                                }),
                                interactive: false
                            }).addTo(locationLayer);
                        });
                    }
                });

            // Grondstoffen
            fetch(`${scriptURL}?action=getResources&naam=${encodeURIComponent(naam)}&t=${Date.now()}`)
                .then(r => r.json()).then(json => {
                    if(json.result === "success") {
                        document.getElementById('food').innerText = json.data.food;
                        document.getElementById('wood').innerText = json.data.wood;
                        document.getElementById('stone').innerText = json.data.stone;
                        document.getElementById('coins').innerText = json.data.coins;
                    }
                });
        }

        function locateUser() { map.locate({setView: true, maxZoom: 17}); }

        map.on('locationfound', (e) => {
            if (!userMarker) {
                userMarker = L.marker(e.latlng, {
                    icon: L.divIcon({
                        className: 'gps-arrow-icon',
                        html: '<div style="font-size: 35px; color: #007bff;">▲</div>',
                        iconSize: [40, 40], iconAnchor: [20, 20]
                    }),
                    rotationAngle: 0, rotationOrigin: 'center center'
                }).addTo(map);
                userMarker.bindPopup("Jij bent hier").openPopup();
            } else {
                userMarker.setLatLng(e.latlng);
            }
        });

        window.onload = () => {
            updateGame();
            setInterval(updateGame, 20000); 
            locateUser();
        };
    </script>
</body>
</html>
